<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>悠遊卡換鮮乳條碼產生器</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/barcodes/JsBarcode.code128.min.js"></script>
  <style>
/* === Reset & Base === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  color: #1a1a2e;
}

/* === Layout === */
.app-container {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px;
  min-height: 100vh;
}

/* === Header === */
.app-header {
  background: #1a56db;
  color: white;
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 20px;
  font-size: 16px;
  font-weight: bold;
  text-align: center;
}

/* === Card List === */
.profile-card {
  background: white;
  border-radius: 10px;
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 1px 6px rgba(0,0,0,.08);
  user-select: none;
}
.profile-card .profile-info .profile-name {
  font-size: 15px;
  font-weight: 600;
}
.profile-card .profile-info .profile-type {
  font-size: 11px;
  color: #888;
  margin-top: 2px;
}
.btn-barcode {
  background: #1a56db;
  color: white;
  border: none;
  border-radius: 7px;
  padding: 7px 12px;
  font-size: 12px;
  cursor: pointer;
  white-space: nowrap;
}
.btn-barcode:active { background: #1344b0; }

/* === Add Button === */
.btn-add {
  width: 100%;
  border: 2px dashed #aac0f0;
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  color: #1a56db;
  font-size: 13px;
  cursor: pointer;
  background: transparent;
  margin-top: 4px;
}
.btn-add:active { background: #e8eeff; }

/* === Empty State === */
.empty-state {
  text-align: center;
  padding: 40px 16px;
  color: #888;
}
.empty-state p { margin-bottom: 8px; font-size: 14px; }

/* === Form === */
.form-back {
  display: flex;
  align-items: center;
  gap: 6px;
  color: #1a56db;
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 16px;
}
.form-title { font-size: 15px; font-weight: bold; margin-bottom: 16px; }
.field-group { margin-bottom: 14px; }
.field-label {
  font-size: 11px;
  color: #555;
  margin-bottom: 4px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.field-input {
  width: 100%;
  border: 1.5px solid #d0d9f0;
  border-radius: 8px;
  padding: 9px 12px;
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
.field-input:focus { border-color: #1a56db; }
.field-input.error { border-color: #e53e3e; }
.field-error { font-size: 11px; color: #e53e3e; margin-top: 3px; display: none; }
.field-error.visible { display: block; }
.field-hint { font-size: 10px; color: #888; margin-top: 3px; }

/* === Card Type Toggle === */
.type-toggle { display: flex; gap: 8px; }
.type-btn {
  flex: 1;
  border: 1.5px solid #d0d9f0;
  border-radius: 8px;
  padding: 9px;
  text-align: center;
  font-size: 12px;
  cursor: pointer;
  background: white;
  color: #555;
  transition: all .2s;
}
.type-btn.active {
  background: #1a56db;
  color: white;
  border-color: #1a56db;
  font-weight: 600;
}

/* === Love Card Hint === */
.love-card-hint {
  background: #fffbeb;
  border: 1px solid #f59e0b;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11px;
  color: #92400e;
  margin-bottom: 14px;
  display: none;
}
.love-card-hint.visible { display: block; }
.love-card-hint a { color: #b45309; font-weight: 600; }

/* === How-To Expand === */
.howto-toggle {
  font-size: 11px;
  color: #1a56db;
  cursor: pointer;
  margin-bottom: 14px;
  text-decoration: underline;
}
.howto-content {
  background: #eef2ff;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11px;
  color: #374151;
  margin-bottom: 14px;
  display: none;
  line-height: 1.6;
}
.howto-content.visible { display: block; }

/* === Submit Button === */
.btn-submit {
  width: 100%;
  background: #1a56db;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 4px;
}
.btn-submit:active { background: #1344b0; }

/* === Barcode View === */
.barcode-back {
  font-size: 13px;
  color: #1a56db;
  cursor: pointer;
  margin-bottom: 16px;
}
.barcode-name {
  font-size: 22px;
  font-weight: bold;
  color: #1a56db;
  text-align: center;
  margin-bottom: 4px;
}
.barcode-type-label {
  text-align: center;
  font-size: 11px;
  color: #888;
  margin-bottom: 20px;
}
.barcode-wrap {
  background: white;
  border-radius: 12px;
  padding: 20px 12px;
  margin-bottom: 12px;
  box-shadow: 0 1px 6px rgba(0,0,0,.08);
  text-align: center;
}
.barcode-wrap svg { width: 100%; height: auto; }
.barcode-number {
  font-size: 13px;
  letter-spacing: 2px;
  color: #444;
  margin-top: 8px;
}
.barcode-fallback {
  background: #fffbeb;
  border: 1px solid #f59e0b;
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 12px;
  color: #92400e;
  margin-bottom: 12px;
}
.barcode-fallback .fallback-title { font-weight: bold; margin-bottom: 6px; }
.barcode-fallback .fallback-row { margin-bottom: 3px; }
.barcode-screenshot-hint {
  text-align: center;
  font-size: 10px;
  color: #aaa;
  margin-top: 8px;
}

/* === Context Menu (long press) === */
.context-menu {
  position: fixed;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
  overflow: hidden;
  z-index: 100;
  min-width: 140px;
  display: none;
}
.context-menu.visible { display: block; }
.context-menu-item {
  padding: 12px 16px;
  font-size: 14px;
  cursor: pointer;
}
.context-menu-item:hover { background: #f5f5f5; }
.context-menu-item.danger { color: #e53e3e; }
.context-overlay {
  position: fixed;
  inset: 0;
  z-index: 99;
  display: none;
}
.context-overlay.visible { display: block; }

/* === LocalStorage Warning === */
.storage-warning {
  background: #fef2f2;
  border: 1px solid #fca5a5;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 11px;
  color: #991b1b;
  margin-bottom: 14px;
  display: none;
}
.storage-warning.visible { display: block; }
  </style>
</head>
<body>
  <div id="view-list">
    <div class="app-container">
      <div class="app-header">🥛 悠遊卡換鮮乳條碼產生器</div>
      <div id="storage-warning" class="storage-warning">
        ⚠️ 此瀏覽器不支援本機儲存，資料將在關閉頁面後消失。
      </div>
      <div id="profiles-container"></div>
      <button class="btn-add" id="btn-add-profile">＋ 新增孩子</button>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-overlay" id="context-overlay"></div>
  <div class="context-menu" id="context-menu">
    <div class="context-menu-item" id="ctx-edit">✏️ 編輯</div>
    <div class="context-menu-item danger" id="ctx-delete">🗑 刪除</div>
  </div>

  <div id="view-form" style="display:none"></div>
  <div id="view-barcode" style="display:none"></div>

  <script>
    // ===== STORAGE =====
    const Storage = (() => {
      const KEY = 'easycard_profiles';

      function isAvailable() {
        try {
          localStorage.setItem('__test__', '1');
          localStorage.removeItem('__test__');
          return true;
        } catch { return false; }
      }

      function getAll() {
        if (!isAvailable()) return [];
        try {
          return JSON.parse(localStorage.getItem(KEY) || '[]');
        } catch { return []; }
      }

      function save(profiles) {
        try {
          localStorage.setItem(KEY, JSON.stringify(profiles));
          return true;
        } catch { return false; }
      }

      function add(profile) {
        const profiles = getAll();
        profiles.push(profile);
        return save(profiles);
      }

      function update(id, patch) {
        const profiles = getAll();
        const idx = profiles.findIndex(p => p.id === id);
        if (idx === -1) return null;
        profiles[idx] = { ...profiles[idx], ...patch };
        save(profiles);
        return profiles[idx];
      }

      function remove(id) {
        return save(getAll().filter(p => p.id !== id));
      }

      function createProfile(name, type, identifier, cardNumber) {
        return {
          id: crypto.randomUUID(),
          name: name.trim(),
          type,             // 'general' | 'love'
          identifier: identifier.trim(),
          cardNumber: cardNumber.replace(/\s/g, ''),
          createdAt: new Date().toISOString()
        };
      }

      return { isAvailable, getAll, add, update, remove, createProfile };
    })();

    // ===== ROUTER =====
    const Router = (() => {
      const views = {
        list: document.getElementById('view-list'),
        form: document.getElementById('view-form'),
        barcode: document.getElementById('view-barcode')
      };

      Object.entries(views).forEach(([key, el]) => {
        if (!el) console.error(`[Router] Missing view element: "${key}"`);
      });

      function show(name) {
        if (!(name in views)) {
          console.error(`[Router] Unknown view: "${name}"`);
          return;
        }
        Object.entries(views).forEach(([key, el]) => {
          el.style.display = key === name ? 'block' : 'none';
        });
      }

      return { show };
    })();

    // ===== PROFILE LIST =====
    const ProfileList = (() => {
      let contextTargetId = null;
      let longPressTimer = null;

      function render() {
        const profiles = Storage.getAll();
        const container = document.getElementById('profiles-container');

        if (!Storage.isAvailable()) {
          document.getElementById('storage-warning').classList.add('visible');
        }

        if (profiles.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <p>還沒有儲存任何孩子的資料</p>
              <p>點下方按鈕新增第一筆</p>
            </div>`;
          return;
        }

        container.innerHTML = profiles.map(p => `
          <div class="profile-card" data-id="${p.id}">
            <div class="profile-info">
              <div class="profile-name">${escapeHtml(p.name)}</div>
              <div class="profile-type">${p.type === 'general' ? '一般悠遊卡' : '兒童優惠卡（愛心卡）'}</div>
            </div>
            <button class="btn-barcode" data-id="${p.id}">顯示條碼</button>
          </div>`).join('');

        // Barcode buttons
        container.querySelectorAll('.btn-barcode').forEach(btn => {
          btn.addEventListener('click', e => {
            e.stopPropagation();
            const profile = Storage.getAll().find(p => p.id === btn.dataset.id);
            if (profile) BarcodeView.show(profile);
          });
        });

        // Long press for edit/delete
        container.querySelectorAll('.profile-card').forEach(card => {
          card.addEventListener('pointerdown', () => {
            longPressTimer = setTimeout(() => showContextMenu(card.dataset.id, card), 600);
          });
          card.addEventListener('pointerup', () => clearTimeout(longPressTimer));
          card.addEventListener('pointercancel', () => clearTimeout(longPressTimer));
          card.addEventListener('pointermove', () => clearTimeout(longPressTimer));
        });
      }

      function showContextMenu(id, card) {
        contextTargetId = id;
        const menu = document.getElementById('context-menu');
        const overlay = document.getElementById('context-overlay');
        const rect = card.getBoundingClientRect();
        menu.style.top = `${rect.bottom + 4}px`;
        menu.style.left = `${rect.left}px`;
        menu.classList.add('visible');
        overlay.classList.add('visible');
      }

      function hideContextMenu() {
        document.getElementById('context-menu').classList.remove('visible');
        document.getElementById('context-overlay').classList.remove('visible');
        contextTargetId = null;
      }

      function init() {
        document.getElementById('btn-add-profile').addEventListener('click', () => {
          ProfileForm.open(null);
        });

        document.getElementById('context-overlay').addEventListener('click', hideContextMenu);

        document.getElementById('ctx-edit').addEventListener('click', () => {
          const profile = Storage.getAll().find(p => p.id === contextTargetId);
          hideContextMenu();
          if (profile) ProfileForm.open(profile);
        });

        document.getElementById('ctx-delete').addEventListener('click', () => {
          if (contextTargetId && confirm('確定要刪除這筆資料？')) {
            Storage.remove(contextTargetId);
            hideContextMenu();
            render();
          }
        });
      }

      return { render, init };
    })();

    // Helper
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ===== INIT =====
    ProfileList.init();
    Router.show('list');
    ProfileList.render();
  </script>
</body>
</html>
